services:
  api:
    container_name: api
    image: ghcr.io/xmplusdev/xmplus-api:latest
    env_file: .env
    ports:
      - "${OCTANE_PORT:-9000}:9000"
      - "${REVERB_SERVER_PORT:-8080}:8080"
    networks:
      - app_network
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${OCTANE_PORT:-9000}/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ui:
    container_name: ui
    image: ghcr.io/xmplusdev/xmplus-ui:latest
    volumes:
      - ./ecosystem.config.cjs:/app/ecosystem.config.cjs
    ports:
      - "3005:3005"
    networks:
      - app_network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mariadb:
    container_name: mariadb
    image: mariadb:12.2
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - app_network
    volumes:
      - ./mysql/mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: redis
    image: redis:8.4-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --bind 0.0.0.0
      --protected-mode no
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - app_network
    volumes:
      - ./redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 128M
    ports:
      - "8081:80"
    networks:
      - app_network
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  npm:
    container_name: npm
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    environment:
      DISABLE_IPV6: 'true'
    ports:
      - '${PORT_HTTP:-80}:80'
      - '${PORT_PANEL:-81}:81'
      - '${PORT_HTTPS:-443}:443'
    volumes:
      - ./nginx-proxy-manager:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
